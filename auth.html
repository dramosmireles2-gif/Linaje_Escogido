<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Activar cuenta</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet"/>

<style>
body{
  margin:0;
  background:#F5EFE6;
  font-family:'DM Sans',sans-serif;
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  color:#1A1A1A;
}

.card{
  background:white;
  padding:40px;
  width:100%;
  max-width:420px;
  border:1px solid rgba(0,0,0,.08);
}

h1{
  margin:0 0 8px;
  font-size:28px;
}

p{
  opacity:.6;
  font-size:14px;
  line-height:1.6;
  margin-bottom:28px;
}

.field{
  margin-bottom:16px;
}

label{
  display:block;
  margin-bottom:6px;
  font-size:12px;
  font-weight:600;
  letter-spacing:.08em;
  text-transform:uppercase;
  opacity:.5;
}

input{
  width:100%;
  padding:12px 14px;
  border:1px solid rgba(0,0,0,.15);
  font-size:14px;
  box-sizing:border-box;
}

button{
  width:100%;
  padding:14px;
  border:none;
  background:#1A1A1A;
  color:#F5EFE6;
  font-size:13px;
  font-weight:700;
  letter-spacing:.08em;
  text-transform:uppercase;
  cursor:pointer;
}

.error{
  color:#c0392b;
  font-size:13px;
  margin-bottom:16px;
}

.success{
  color:#27ae60;
  font-size:13px;
  margin-bottom:16px;
}
</style>
</head>

<body>

<div class="card">

  <h1>Activar cuenta</h1>

  <p>
    Crea tu contraseña para acceder al panel administrativo.
  </p>

  <div id="msg"></div>

  <form id="passwordForm">

    <div class="field">
      <label>Nueva contraseña</label>
      <input type="password" id="password" required/>
    </div>

    <div class="field">
      <label>Confirmar contraseña</label>
      <input type="password" id="confirmPassword" required/>
    </div>

    <button type="submit">
      Activar cuenta
    </button>

  </form>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const SUPABASE_URL = 'https://xzwyyzgcxhpbjioqdrmn.supabase.co';

const SUPABASE_KEY ='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh6d3l5emdjeGhwYmppb3Fkcm1uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxNzg0MjQsImV4cCI6MjA5Mzc1NDQyNH0.-En3HLRgdDbnHuQSUO7LfVyMR0-0xMUdZdECz5KGezY';

const { createClient } = supabase;

const db = createClient(
  SUPABASE_URL,
  SUPABASE_KEY
);

async function init() {

  const hash = window.location.hash;

  if (!hash) {
    showError('Link inválido.');
    return;
  }

  const params =
    new URLSearchParams(hash.substring(1));

  const access_token =
    params.get('access_token');

  const refresh_token =
    params.get('refresh_token');

  if (!access_token || !refresh_token) {
    showError('Token inválido.');
    return;
  }

  const { error } =
    await db.auth.setSession({
      access_token,
      refresh_token
    });

  if (error) {
    showError(error.message);
    return;
  }

}

function showError(msg){
  document.getElementById('msg').innerHTML =
    `<div class="error">${msg}</div>`;
}

function showSuccess(msg){
  document.getElementById('msg').innerHTML =
    `<div class="success">${msg}</div>`;
}

document
.getElementById('passwordForm')
.addEventListener('submit', async (e)=>{

  e.preventDefault();

  const password =
    document.getElementById('password').value;

  const confirm =
    document.getElementById('confirmPassword').value;

  if(password !== confirm){
    showError('Las contraseñas no coinciden.');
    return;
  }

  if(password.length < 6){
    showError('La contraseña debe tener mínimo 6 caracteres.');
    return;
  }

  const { error } =
    await db.auth.updateUser({
      password
    });

  if(error){
    showError(error.message);
    return;
  }

  showSuccess('Cuenta activada correctamente.');

  setTimeout(()=>{
    window.location.href =
    'https://dramosmireles2-gif.github.io/Linaje_Escogido/admin.html';
  },1500);

});

init();

</script>

</body>
</html>
